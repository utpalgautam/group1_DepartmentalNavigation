plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.nitc.dept_nav_app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.nitc.dept_nav_app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    constraints {
        implementation("androidx.core:core-ktx:1.13.1") {
            because("Avoid requiring AGP 8.9.1+")
        }
        implementation("androidx.core:core:1.13.1") {
            because("Avoid requiring AGP 8.9.1+")
        }
    }
}

configurations.all {
    resolutionStrategy {
        force "androidx.core:core-ktx:1.13.1"
        force "androidx.core:core:1.13.1"
    }
}

// Automatically establish adb reverse port forwarding for GraphHopper connection on physical devices
gradle.taskGraph.whenReady {
    def adbPath = android.adbExecutable.absolutePath
    def command = [adbPath, "reverse", "tcp:8989", "tcp:8989"]
    try {
        println "Executing $command to forward port 8989 for GraphHopper..."
        def process = new ProcessBuilder(command).start()
        process.waitFor()
        if (process.exitValue() == 0) {
            println "Successfully forwarded port 8989!"
        } else {
            println "Failed to forward port 8989. Exit code: ${process.exitValue()}"
            println "Error: ${process.err.text}"
        }
    } catch (Exception e) {
        println "Exception executing adb reverse: ${e.message}"
    }
}
